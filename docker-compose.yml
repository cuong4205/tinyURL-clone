services:

  mongo:
    image: mongo:7
    container_name: url_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: url_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: url_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://mongo:27017/urlshortener
      REDIS_HOST: redis
      APP_BASE_URL: http://localhost:8080/
    depends_on:
      - mongo
      - redis
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: url_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE: http://localhost:8080
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  mongo_data:
  redis_data:

networks:
  app_net:
    driver: bridge
