server.port=8080

# MongoDB — override MONGO_URI env var in Docker; falls back to localhost for local dev
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/urlshortener}

# Redis — override REDIS_HOST env var in Docker; falls back to localhost for local dev
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# Base URL returned to the client in the shortened link response
# In Docker this should be the public-facing URL (e.g. http://localhost)
app.base-url=${APP_BASE_URL:http://localhost:8080/zip}

# How often (ms) the click-count flush job runs (Redis -> MongoDB)
app.click-flush-interval-ms=10000
